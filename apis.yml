aid: open-yukon-ca
name: Yukon Open Data
description: >-
  Yukon Open Data is a territorial government open-data portal for Canada running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 3,773 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
