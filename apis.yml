apis:
  - aid: open-yukon-ca:catalog
    name: Yukon Open Data CKAN Action API
    description: >-
      CKAN Action API for Yukon Open Data, a consistent JSON-over-HTTP interface over a catalog of 3,773 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://open.yukon.ca/api/3/action/.
    humanURL: https://open.yukon.ca
